[package]
name = "cccc"
version = "0.1.0"
edition = "2024"
description = "A CLI that measures Cognitive Complexity and Cyclomatic Complexity of TypeScript/JavaScript code"
license = "MIT"

[dependencies]
oxc_allocator = "0.133"
oxc_parser = "0.133"
oxc_ast = "0.133"
# default features pull in `serialize`, which switches the AST to a phantom
# raw-transfer layout where struct fields are inaccessible. We only need the
# Visit trait, so disable defaults.
oxc_ast_visit = { version = "0.133", default-features = false }
oxc_span = "0.133"
oxc_syntax = "0.133"
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[profile.release]
lto = true
codegen-units = 1
strip = true
