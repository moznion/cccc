# Dedicated configuration for tracking complexity metrics (Cognitive and
# Cyclomatic Complexity) as octocov Custom Metrics.
#
# - Converts the results measured by cccc-action into the Custom Metrics
#   JSON format and passes them to octocov via the OCTOCOV_CUSTOM_METRICS_*
#   environment variables (see complexity.yml).
# - Code coverage is measured by the .octocov.yml configuration used in the
#   `test` job of ci.yml, so it is intentionally omitted here.
#   (Even without coverage configured, octocov simply outputs
#   "Skip measuring code coverage" and continues.)
# - Stores the data under a dedicated `complexity-reports` prefix within the
#   shared `octocov` datastore branch, so it does not get mixed with the
#   coverage reports (stored under `coverage-reports` on the same branch by
#   .octocov.yml).
#
# The `repository` field intentionally appends a subpath such as
# `${GITHUB_REPOSITORY}/complexity`.
# octocov derives the pull request comment identifier (`sig`) from the
# `repository` value. Without this suffix, the comments generated by this
# workflow and the `test` job of ci.yml would both use the same identifier,
# `<!-- octocov -->`, causing the workflow that runs later to minimize the
# earlier comment.
# Appending a subpath changes the identifier to
# `<!-- octocov:complexity -->`, allowing both comments to coexist.
# It also makes the comment title
# "Code Metrics Report (complexity)", making it easier to distinguish the two.
repository: ${GITHUB_REPOSITORY}/complexity
comment:
  if: is_pull_request
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - github://${GITHUB_REPOSITORY}@octocov/complexity-reports
diff:
  datastores:
    - github://${GITHUB_REPOSITORY}@octocov/complexity-reports
